<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testing Mess App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      width: min(90%, 420px);
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #2563eb;
    }

    .status {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #dcfce7;
      color: #166534;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Testing Mess App</h1>
    <p>File testing pertama berhasil dibuat di repository GitHub.</p>
    <div class="status">Repository aktif ✅</div>
  </main>
</body>
</html>
